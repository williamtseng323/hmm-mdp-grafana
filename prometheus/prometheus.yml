# Scrape HMM services on your laptop via SSH local forwards (see scripts/tunnel-aws-metrics.sh).
# Prometheus (Docker) uses host.docker.internal → those ports (see docker-compose extra_hosts).
#
# Default local ports 19101–19105 → remote 127.0.0.1:9101–9105 (override HMM_METRICS_PORT per service on AWS).
global:
  scrape_interval: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: mdp
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:19101"]
    relabel_configs:
      - target_label: instance
        replacement: aws

  - job_name: pdp
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:19102"]
    relabel_configs:
      - target_label: instance
        replacement: aws

  - job_name: alpha_engine
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:19103"]
    relabel_configs:
      - target_label: instance
        replacement: aws

  - job_name: order_manager
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:19104"]
    relabel_configs:
      - target_label: instance
        replacement: aws

  - job_name: order_executor
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:19105"]
    relabel_configs:
      - target_label: instance
        replacement: aws
