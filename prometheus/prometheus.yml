# Scrape MDP via SSH tunnel. Local port must match `targets` below, e.g.:
#   ssh -N -L 9102:127.0.0.1:9101 ec2-user@<host> -i ~/.ssh/key.pem
# Prometheus (Docker) hits your Mac via host.docker.internal (see compose extra_hosts).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: mdp
    honor_labels: true
    static_configs:
      - targets: ["host.docker.internal:9102"]
    metrics_path: /metrics
    relabel_configs:
      - target_label: instance
        replacement: mdp-tunnel
